name: Feature request
description: Propose a product, UX, integration, or runtime improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What user problem are you trying to solve?
      placeholder: The current workflow fails because...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the feature or behavioral change you want.
      placeholder: I want DunderIA to...
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints and tradeoffs
      description: Mention provider/runtime limits, UX constraints, safety concerns, or compatibility requirements.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or alternative approaches did you try?
  - type: textarea
    id: success
    attributes:
      label: What success looks like
      description: How would we know this is actually useful if shipped?
